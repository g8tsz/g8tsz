<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="g8tsz — developer specializing in automation and anti-cheat">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>

    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c4b5fd"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8b5cf6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <ellipse cx="600" cy="150" rx="520" ry="220" fill="url(#glow)"/>

  <g font-family="'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, Consolas, monospace" fill="#8b5cf6" opacity="0.55" font-size="14">
    <text x="40"   y="40">// anti-cheat.hook(game)</text>
    <text x="40"   y="270">// automation.run()</text>
    <text x="900"  y="40">0x7FFD::read()</text>
    <text x="900"  y="270">exit(0)</text>
  </g>

  <g transform="translate(600,120)" text-anchor="middle" filter="url(#softGlow)">
    <text font-family="'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, Consolas, monospace"
          font-weight="800" font-size="130" fill="url(#title)"
          letter-spacing="-2">
      g8tsz
    </text>
  </g>

  <g transform="translate(600,210)" text-anchor="middle"
     font-family="'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, Consolas, monospace">
    <text font-size="22" fill="#e5e7eb" font-weight="600" letter-spacing="1">
      developer specializing in
      <tspan fill="#a78bfa" font-weight="700">automation</tspan>
      <tspan fill="#e5e7eb">&amp;</tspan>
      <tspan fill="#a78bfa" font-weight="700">anti-cheat</tspan>
    </text>
  </g>

  <g transform="translate(600,250)" text-anchor="middle" opacity="0.7">
    <line x1="-180" y1="0" x2="-20" y2="0" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#8b5cf6">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="20" y1="0" x2="180" y2="0" stroke="#8b5cf6" stroke-width="1"/>
  </g>
</svg>
